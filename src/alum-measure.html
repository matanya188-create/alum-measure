    const w=document.getElementById("sim3dwrap"); if(!w) return;
    if(document.fullscreenElement){ document.exitFullscreen().catch(()=>{}); }
    else if(w.requestFullscreen){ w.requestFullscreen().catch(()=>{}); }
  },
  simAdd(dir){
    if(dir==="v"){ sim.vLines.push(0.5); simSel={dir:"v",idx:sim.vLines.length-1}; }
    else { sim.hLines.push({f:0.5,w:-1}); simSel={dir:"h",idx:sim.hLines.length-1}; }
    saveSim(); renderSim2D(); buildSimWindow();
  },
  simDelSel(){
    if(!simSel){ uiAlert("בחר קודם קו או צורה (לחיצה), ואז מחק.","מחיקה"); return; }
    if(simSel.dir==="v") sim.vLines.splice(simSel.idx,1);
    else if(simSel.dir==="h") sim.hLines.splice(simSel.idx,1);
    else if(simSel.dir==="s") (sim.shapes||[]).splice(simSel.idx,1);
    simSel=null; saveSim(); renderSim2D(); buildSimWindow();
  },
  simClear(){
    uiConfirm("לנקות את כל החלוקות והצורות?",{title:"ניקוי",ok:"נקה",danger:true}).then(ok=>{
      if(!ok) return; sim.vLines=[]; sim.hLines=[]; sim.shapes=[]; simSel=null; saveSim(); renderSim2D(); buildSimWindow();
    });
  },
  simDim(k,v){
    sim[k]=v; saveSim();
    const r=document.getElementById("dimr-"+k), n=document.getElementById("dimn-"+k);
    if(r && r!==document.activeElement && String(r.value)!==String(v)) r.value=parseFloat(v)||0;
    if(n && n!==document.activeElement && String(n.value)!==String(v)) n.value=v;
    renderSim2D(); buildSimWindow();
  },
  simSet(k,v){ sim[k]=v; saveSim(); renderSimControls(); renderSim2D(); buildSimWindow(); },
  simColor(name,code){ sim.color=name+" ("+code+")"; saveSim(); renderSimControls(); renderSim2D(); buildSimWindow(); },
  simFromItem(pid,iid){
    const p=proj(pid), it=p&&p.items.find(x=>x.id===iid); if(!it) return;
    sim=simFromItem(it); simSel=null; saveSim(); nav("/sim");
  },
  simShare(){
    const fail=()=>uiAlert("לא הצלחתי לייצר תמונה — אפשר לצלם מסך ולשלוח.","שיתוף");
    const sendBlob=blob=>{
      if(!blob){ fail(); return; }
      const file=new File([blob],"alum-hadmaya.png",{type:"image/png"});
      if(navigator.canShare && navigator.canShare({files:[file]})) navigator.share({files:[file],title:"הדמיה — אלום אלבז"}).catch(()=>{});
      else { const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="alum-hadmaya.png"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),3000); }
    };
    const cv3=document.getElementById("sim3dcv");
    if(cv3 && sim3d){
      sim3d.renderer.render(sim3d.scene,sim3d.camera);
      cv3.toBlob(sendBlob,"image/png");
      return;
    }
    const svg=document.getElementById("sim2d"); if(!svg) return;
    const toData=url=>fetch(url).then(r=>r.blob()).then(b=>new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b);}));
    Promise.all([toData(VIEW_IMG)]).then(([viewD])=>{
      let s=svg.outerHTML
        .replace('<svg','<svg xmlns="http://www.w3.org/2000/svg" width="720" height="600"')
        .split('href="'+VIEW_IMG+'"').join('href="'+viewD+'"');
      const img=new Image();
      img.onload=()=>{
        const cv=document.createElement("canvas"); cv.width=720; cv.height=600;
        const ctx=cv.getContext("2d"); ctx.fillStyle="#eef1f5"; ctx.fillRect(0,0,720,600);
        ctx.drawImage(img,0,0,720,600);
        cv.toBlob(blob=>{
          if(!blob){ fail(); return; }
          const file=new File([blob],"alum-hadmaya.png",{type:"image/png"});
          if(navigator.canShare && navigator.canShare({files:[file]})) navigator.share({files:[file],title:"הדמיה — אלום אלבז"}).catch(()=>{});
          else { const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="alum-hadmaya.png"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),3000); }
        },"image/png");
      };
      img.onerror=fail;
      img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(s);
    }).catch(fail);
  },
  pf(pid,k,v){ const p=proj(pid); if(p){ p[k]=v; save(); } },
  delProject(pid){
    const cur=proj(pid);
    const back = cur && cur.kind==="quote" ? "/quotes" : "/projects";
    uiConfirm("למחוק את הפריט על כל הפריטים שלו? אין דרך חזרה.",{title:"מחיקה",ok:"מחק",danger:true}).then(ok=>{
      if(!ok) return;
      DB.projects = DB.projects.filter(p=>p.id!==pid); save(); nav(back);
    });
  },
  move(pid,i,dir){
    const p=proj(pid); const j=i+dir;
    if(!p || j<0 || j>=p.items.length) return;
    const t=p.items[i]; p.items[i]=p.items[j]; p.items[j]=t;
    save(); render();
  },
  dupItem(pid,iid){
    const p=proj(pid); const src=p.items.find(x=>x.id===iid);
    if(!src) return;
    const cp=JSON.parse(JSON.stringify(src)); cp.id=uid();
    p.items.splice(p.items.indexOf(src)+1,0,cp); save(); render();
  },
  /* item editor */
  f(k,v){
    draft[k]=v;
    persistDraft();
    if(k==="type"||k==="op"||k==="mesh"||k==="profile"||k==="photo"||k==="box") renderItemForm();
    if(k==="unit"||k==="measureType"||k==="openDir"||k==="handleSide"||k==="elecSide"||k==="ropeSide"||k==="railH") renderItemForm();
    renderPreview();
  },
  step(key,delta,min,max){
    const v=Math.max(min,Math.min(max,(Number(draft[key])||min)+delta));
    draft[key]=v; persistDraft(); renderItemForm(); renderPreview();
  },
  hal(side){ draft.hal[side]=!draft.hal[side]; persistDraft(); renderItemForm(); renderPreview(); },
  openTypes(){ typeOpen=true; renderItemForm(); },
  setType(id){
    const t=TYPE(id);
    draft.type=id;
    draft.op = t.defOp || draft.op;
    draft.mesh = !!t.mesh;
    draft.openDir = t.sashes===3 ? "std" : "center";
    draft.hal = halDefaults(t);
    typeOpen=false; persistDraft(); renderItemForm(); renderPreview();
  },
  colorFilter(q){
    draft.color=q;
    persistDraft();
    const list=document.getElementById("colorList");
    if(!list) return;
    const qq=(q||"").trim();
    let html="";
    KLIL_COLORS.forEach(f=>{
      const hits=f.list.filter(([n,c])=> !qq || n.includes(qq) || c.includes(qq) || c.toLowerCase().includes(qq.toLowerCase()));
      if(hits.length){
        html+='<div class="fam">'+f.fam+'</div>';
        html+=hits.map(([n,c])=>'<button type="button" class="copt" onclick="App.pickColor(\''+esc(n).replace(/'/g,"\\'")+'\',\''+c+'\')">'+esc(n)+' <small class="num">'+c+'</small></button>').join("");
      }
    });
    list.innerHTML = html || '<div class="fam">אין התאמה במניפה — מה שהקלדת יישמר כגוון חופשי</div>';
    list.style.display="block";
  },
  pickColor(name,code){
    draft.color = name+" ("+code+")";
    persistDraft();
    const inp=document.getElementById("colorInput"); if(inp) inp.value=draft.color;
    const list=document.getElementById("colorList"); if(list) list.style.display="none";
  },
  photo(input){
    const file=input.files && input.files[0];
    if(!file) return;
    const img=new Image();
    const rd=new FileReader();
    rd.onload=e=>{
      img.onload=()=>{
        const max=700;
        const sc=Math.min(1, max/Math.max(img.width,img.height));
        const cv=document.createElement("canvas");
        cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        draft.photo=cv.toDataURL("image/jpeg",0.62);
        persistDraft();
        renderItemForm();
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  },
  saveItem(){
    const p=proj(draftPid); if(!p) return;
    const doSave=()=>{
      if(draftIid){
        const idx=p.items.findIndex(x=>x.id===draftIid);
        if(idx>=0) p.items[idx]=draft; else p.items.push(draft);
      } else p.items.push(draft);
      save(); clearDraft(); nav("/p/"+p.id);
    };
    const miss = missingList(draft);
    if(miss.length){
      uiConfirm("חסרים נתונים: "+miss.join(", ")+".\nאפשר לשמור ולהשלים אחר כך — אבל קובץ ליצרן ייחסם עד שהכל יושלם.",{title:"נתונים חסרים",ok:"שמור בכל זאת"}).then(ok=>{ if(ok) doSave(); });
    } else doSave();
  },
  delItem(){
    uiConfirm("למחוק את הפריט?",{title:"מחיקת פריט",ok:"מחק",danger:true}).then(ok=>{
      if(!ok) return;
      const p=proj(draftPid);
      p.items=p.items.filter(x=>x.id!==draftIid);
      save(); clearDraft(); nav("/p/"+p.id);
    });
  },
  discardDraft(){
    uiConfirm("למחוק את הטיוטה ולהתחיל מחדש?",{title:"טיוטה",ok:"התחל מחדש",danger:true}).then(ok=>{
      if(ok){ clearDraft(); render(); }
    });
  },
  /* share the app (WhatsApp / share sheet) */
  shareApp(){
    const url = "https://matanya188-create.github.io/alum-measure/";
    const text = "פנקס מדידות אלומיניום — אלום אלבז 📐\nפותחים בכרום ולוחצים \"התקן\":\n" + url;
    if(navigator.share){
      navigator.share({title:"פנקס מדידות אלומיניום", text:text}).catch(()=>{});
    } else {
      window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
    }
  },
  /* update check */
  checkUpdate(btn){
    if(btn){ btn.disabled=true; btn.textContent="בודק..."; }
    fetch("version.json?t="+Date.now(), {cache:"no-store"})
      .then(r=>r.json())
      .then(v=>{
        if(Number(v.version) > APP_VERSION){
          uiConfirm("נמצאה גרסה חדשה ("+v.version+")!\nהעדכון לוקח שניות והנתונים שלך נשמרים.",{title:"🎉 יש עדכון",ok:"עדכן עכשיו",cancel:"אחר כך"}).then(yes=>{
            if(!yes){ render(); return; }
            const done = () => location.reload();
            if(navigator.serviceWorker && navigator.serviceWorker.getRegistrations){
              navigator.serviceWorker.getRegistrations()
                .then(rs=>Promise.all(rs.map(r=>r.update())))
                .then(done, done);
            } else done();
          });
          return;
        }
        uiAlert("האפליקציה מעודכנת (גרסה "+APP_VERSION+") ✓","הכל עדכני");
        render();
      })
      .catch(()=>{ uiAlert("אין חיבור לאינטרנט — אי אפשר לבדוק עדכונים כרגע.","אין חיבור"); render(); });
  },
  /* PWA install */
  install(){
    if(installEvt){
      installEvt.prompt();
      installEvt.userChoice.then(()=>{ installEvt=null; render(); }).catch(()=>{ installEvt=null; render(); });
    } else {
      uiAlert("אם לא קפצה חלונית התקנה, יש שתי אפשרויות:\n\n1) האפליקציה כבר מותקנת — חפש את הלוגו של אלום אלבז במגירת האפליקציות של הטלפון.\n\n2) התקנה ידנית בכרום: תפריט ⋮ למעלה ← \"הוספה למסך הבית\" ← \"התקנה\".","התקנת האפליקציה");
    }
  },
  /* company logo */
  logoUpload(input){
    const file=input.files && input.files[0];
    if(!file) return;
    const img=new Image();
    const rd=new FileReader();
    rd.onload=e=>{
      img.onload=()=>{
        const max=460;
        const sc=Math.min(1, max/Math.max(img.width,img.height));
        const cv=document.createElement("canvas");
        cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        DB.settings.logo=cv.toDataURL("image/jpeg",0.85);
        save(); render();
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  },
  logoRemove(){
    uiConfirm("לחזור ללוגו המובנה של אלום אלבז?",{title:"לוגו",ok:"כן, חזור למובנה"}).then(ok=>{
      if(ok){ DB.settings.logo=null; save(); render(); }
    });
  },
  /* export */
  eo(k,v){ expOpts[k]=v; render(); },
  /* backup */
  backup(){
    const blob=new Blob([JSON.stringify(DB,null,1)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="alum-measure-backup.json";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  },
  restore(input){
    const file=input.files && input.files[0];
    if(!file) return;
    const rd=new FileReader();
    rd.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data || !Array.isArray(data.projects)) throw 0;
        uiConfirm("השחזור יחליף את כל הנתונים הקיימים במכשיר. להמשיך?",{title:"שחזור מגיבוי",ok:"שחזר",danger:true}).then(ok=>{
          if(ok){ DB=data; if(!DB.settings) DB.settings={logo:null}; save(); render(); }
        });
      }catch(err){ uiAlert("הקובץ אינו גיבוי תקין.","שגיאה"); }
    };
    rd.readAsText(file);
  }
};

/* close color list when tapping outside */
document.addEventListener("click", e=>{
  const list=document.getElementById("colorList");
  if(list && !e.target.closest(".colorbox")) list.style.display="none";
});

window.App=App; window.nav=nav; window.renderItemForm=renderItemForm;
render();
</script>
