<title>פנקס מדידות אלומיניום</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
:root{
  --paper:#f2f4f8; --surface:#ffffff; --ink:#101828; --ink2:#667085;
  --pen:#2c4e9e; --pen-soft:#e2f6f3; --line:#e4e7ec; --line2:#edf0f5;
  --acc:#0ca7b4; --grad:linear-gradient(135deg,#0ca7b4,#2dd4a8);
  --ok:#12a150; --warn:#b45309; --warn-bg:#fff4df; --danger:#e04f3f;
  --shadow:0 2px 6px rgba(16,24,40,.05), 0 12px 30px rgba(16,24,40,.08);
  --r:20px;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#0e1320; --surface:#1a2233; --ink:#eef1f6; --ink2:#9aa5b8;
    --pen:#8ba9ec; --pen-soft:#123a3c; --line:#28324b; --line2:#232d47;
    --acc:#25c9d0; --grad:linear-gradient(135deg,#17b5bd,#2fd8ac);
    --ok:#4ade80; --warn:#f0b35c; --warn-bg:#2f2610; --danger:#ff7a66;
    --shadow:0 2px 8px rgba(0,0,0,.35), 0 14px 34px rgba(0,0,0,.3);
  }
}
:root[data-theme="light"]{
  --paper:#f2f4f8; --surface:#ffffff; --ink:#101828; --ink2:#667085;
  --pen:#2c4e9e; --pen-soft:#e2f6f3; --line:#e4e7ec; --line2:#edf0f5;
  --acc:#0ca7b4; --grad:linear-gradient(135deg,#0ca7b4,#2dd4a8);
  --ok:#12a150; --warn:#b45309; --warn-bg:#fff4df; --danger:#e04f3f;
  --shadow:0 2px 6px rgba(16,24,40,.05), 0 12px 30px rgba(16,24,40,.08);
}
:root[data-theme="dark"]{
  --paper:#0e1320; --surface:#1a2233; --ink:#eef1f6; --ink2:#9aa5b8;
  --pen:#8ba9ec; --pen-soft:#123a3c; --line:#28324b; --line2:#232d47;
  --acc:#25c9d0; --grad:linear-gradient(135deg,#17b5bd,#2fd8ac);
  --ok:#4ade80; --warn:#f0b35c; --warn-bg:#2f2610; --danger:#ff7a66;
  --shadow:0 2px 8px rgba(0,0,0,.35), 0 14px 34px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Segoe UI","Heebo","Assistant",Tahoma,Arial,sans-serif;
  font-size:16px; line-height:1.45;
}
#app{max-width:760px;margin:0 auto;padding:0 14px 96px}
h1,h2,h3{text-wrap:balance;margin:0}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{
  font:inherit;color:var(--ink);background:var(--surface);
  border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;width:100%;
}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2.5px solid var(--acc);outline-offset:1px}
label{font-size:.85rem;font-weight:600;color:var(--ink2);display:block;margin-bottom:6px}
.field{margin-bottom:14px}
.num{font-variant-numeric:tabular-nums}

.topbar{
  position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
  background:var(--paper);padding:16px 0 12px;margin-bottom:14px;
}
.topbar h1{font-size:1.3rem;font-weight:800;letter-spacing:-.01em}
.topbar .sub{font-size:.82rem;color:var(--ink2);margin-top:2px}
.backbtn{
  flex:none;width:42px;height:42px;border-radius:14px;background:var(--surface);
  box-shadow:var(--shadow);font-size:1.2rem;display:flex;align-items:center;justify-content:center;
}
.spacer{flex:1}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:46px;padding:10px 20px;border-radius:999px;font-weight:700;
  background:var(--surface);border:1.5px solid var(--line);color:var(--ink);
}
.btn.primary{background:var(--grad);border:none;color:#fff;box-shadow:0 8px 20px rgba(18,178,171,.35)}
.btn.danger{color:var(--danger);border-color:transparent;background:rgba(224,79,63,.1)}
.btn.small{min-height:38px;padding:7px 14px;font-size:.85rem}
.btn.wide{width:100%}
.fab{
  position:fixed;bottom:18px;inset-inline-start:50%;transform:translateX(50%);
  z-index:30;box-shadow:0 12px 30px rgba(18,178,171,.45);min-width:min(420px,calc(100vw - 40px));
}

.card{
  background:var(--surface);border:none;border-radius:var(--r);
  padding:16px;box-shadow:var(--shadow);margin-bottom:14px;
}
.card.tap{cursor:pointer}
.rowline{display:flex;align-items:center;gap:12px}
.grow{flex:1;min-width:0}
.muted{color:var(--ink2);font-size:.85rem}
.title-md{font-weight:800;font-size:1.05rem}

.banner{background:var(--grad);color:#fff}
.banner b{font-size:1.05rem}
.banner .muted{color:rgba(255,255,255,.9)}
.banner .btn{background:#fff;border:none;color:#0b7f89;font-weight:800;box-shadow:none}
.pchip{flex:none;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.35rem}
.pc0{background:#ffefc2}.pc1{background:#d3f6e3}.pc2{background:#ffdfe9}.pc3{background:#d9edff}
@media (prefers-color-scheme: dark){
  .pc0{background:#4a3d12}.pc1{background:#12402b}.pc2{background:#47202e}.pc3{background:#173a56}
}
:root[data-theme="dark"] .pc0{background:#4a3d12}
:root[data-theme="dark"] .pc1{background:#12402b}
:root[data-theme="dark"] .pc2{background:#47202e}
:root[data-theme="dark"] .pc3{background:#173a56}
:root[data-theme="light"] .pc0{background:#ffefc2}
:root[data-theme="light"] .pc1{background:#d3f6e3}
:root[data-theme="light"] .pc2{background:#ffdfe9}
:root[data-theme="light"] .pc3{background:#d9edff}

.seg{display:flex;background:var(--line2);border:none;border-radius:999px;padding:4px;gap:4px}
.seg button{flex:1;min-height:40px;padding:8px 6px;font-weight:700;color:var(--ink2);border-radius:999px}
.seg button.on{background:var(--grad);color:#fff;box-shadow:0 3px 10px rgba(18,178,171,.4)}
.seg.big button{min-height:54px;font-size:.98rem}

.measure-box{border:none;background:var(--warn-bg);border-radius:16px;padding:14px;margin-bottom:14px}
.measure-box label{color:var(--warn);font-size:.9rem}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1.5px solid transparent;border-radius:999px;padding:9px 18px;font-weight:700;
  background:var(--line2);color:var(--ink2);min-height:40px;
}
.chip.on{background:var(--pen-soft);border-color:var(--acc);color:var(--acc)}

.typegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media (max-width:420px){ .typegrid{grid-template-columns:repeat(2,1fr)} }
.typecard{
  border-radius:16px;background:var(--surface);box-shadow:0 1px 5px rgba(16,24,40,.1);
  padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;
  border:2px solid transparent;
}
.typecard.on{border-color:var(--acc);background:var(--pen-soft)}
.typecard .tname{font-size:.72rem;font-weight:600;line-height:1.25}
.typecard .tnum{font-size:.7rem;color:var(--ink2)}

.sk{color:var(--pen)}
.sk svg{display:block}
.preview-wrap{
  background:var(--surface);border:none;border-radius:var(--r);
  display:flex;justify-content:center;padding:12px;margin-bottom:14px;box-shadow:var(--shadow);
}

.thumb{flex:none;background:var(--surface);border-radius:8px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.colorbox{position:relative}
.colorlist{
  position:absolute;top:100%;inset-inline:0;z-index:40;max-height:260px;overflow-y:auto;
  background:var(--surface);border:none;border-radius:14px;box-shadow:var(--shadow);
}
.colorlist .fam{font-size:.72rem;font-weight:800;color:var(--acc);padding:10px 14px 2px;letter-spacing:.03em}
.colorlist .copt{display:block;width:100%;text-align:start;padding:10px 14px;border-top:1px solid var(--line2)}
.colorlist .copt small{color:var(--ink2)}
.colorlist .copt:active{background:var(--pen-soft)}

.photo-thumb{max-width:130px;max-height:130px;border-radius:14px;display:block;box-shadow:var(--shadow)}

.itemrow{display:flex;gap:12px;align-items:center}
.itemrow .acts{display:flex;flex-direction:column;gap:5px}
.iconbtn{
  width:36px;height:36px;border-radius:12px;border:none;
  background:var(--line2);font-size:.95rem;display:flex;align-items:center;justify-content:center;color:var(--ink2);
}
.badge{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.75rem;font-weight:800}
.badge.prod{background:var(--grad);color:#fff}
.badge.open{background:var(--warn-bg);color:var(--warn);border:1.5px solid var(--warn)}

.modal-overlay{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  padding:24px;background:rgba(12,17,26,.5);backdrop-filter:blur(3px);
  animation:mfade .16s ease-out;
}
.modal{
  background:var(--surface);color:var(--ink);border:none;
  border-radius:24px;box-shadow:0 24px 70px rgba(0,0,0,.4);
  max-width:380px;width:100%;padding:22px;
  animation:mpop .2s cubic-bezier(.2,1.2,.4,1);
}
.modal h3{font-size:1.08rem;margin-bottom:8px}
.modal .msg{color:var(--ink2);white-space:pre-line;line-height:1.65;margin-bottom:20px;font-size:.95rem}
.modal .btns{display:flex;gap:10px}
.modal .btns .btn{flex:1}
@keyframes mpop{from{transform:scale(.9) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes mfade{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion: reduce){ .modal,.modal-overlay{animation:none} }
.errbanner{
  background:rgba(224,79,63,.08);border:none;border-inline-start:4px solid var(--danger);
  color:var(--danger);border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:.92rem;line-height:1.7;
}
.empty{
  text-align:center;color:var(--ink2);padding:44px 16px;border:2px dashed var(--line);
  border-radius:var(--r);margin-bottom:14px;
}

.exp-tools{position:sticky;top:0;z-index:25;background:var(--paper);padding:12px 0;margin-bottom:14px}

/* ===== Export sheets ===== */
.sheet{
  background:#fff;color:#161a20;width:100%;max-width:210mm;margin:0 auto 16px;
  padding:9mm;border:1px solid var(--line);border-radius:4px;box-shadow:var(--shadow);
  direction:rtl;
}
.sheet .sk{color:#233f80}
.sheet-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;min-height:10mm}
.sheet-top .bsd{font-size:.78rem;font-weight:700;color:#333;line-height:1}
.sheet-logo{height:13mm;max-width:36mm;object-fit:contain;border-radius:2px}
.sheet-head{border-bottom:2.5px solid #233f80;padding-bottom:8px;margin-bottom:10px}
.sheet-head h2{font-size:1.15rem;color:#161a20}
.sheet-head .meta{display:flex;flex-wrap:wrap;gap:4px 18px;font-size:.82rem;color:#444;margin-top:4px}
.sheet-grid{display:grid;gap:6px}
.cell{
  border:1.5px solid #8a93a5;border-radius:6px;padding:6px;display:flex;flex-direction:column;
  break-inside:avoid;
}
.cell .cellhead{display:flex;justify-content:space-between;align-items:baseline;gap:6px;border-bottom:1px solid #d5d9e2;padding-bottom:2px;margin-bottom:2px}
.cell .cnum{font-weight:800;font-size:.95rem;color:#233f80}
.cell .cloc{font-weight:700;font-size:.85rem;color:#161a20;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell .csk{display:flex;justify-content:center;padding:2px 0}
.cell .cdims{font-weight:800;font-size:1.02rem;text-align:center;font-variant-numeric:tabular-nums;color:#161a20}
.cell .cdims .u{font-weight:600;font-size:.78rem;color:#555}
.cell .cbadge{text-align:center;margin:2px 0}
.cell .cbadge span{font-size:.68rem;font-weight:800;padding:2px 8px;border-radius:99px;border:1.5px solid #233f80;color:#233f80}
.cell .cbadge span.bopen{border-color:#a05a1f;color:#a05a1f;background:#fdf3e4}
.cell .cinfo{font-size:.72rem;color:#333;line-height:1.4}
.cell .cinfo b{color:#161a20}
.cell .ctype{font-size:.75rem;font-weight:700;color:#233f80;text-align:center}
.cell .cnote{font-size:.7rem;color:#555;border-top:1px dashed #ccc;margin-top:2px;padding-top:2px}
.cell img{max-width:100%;max-height:26mm;object-fit:contain;border-radius:4px;margin-top:3px}
.sheet-foot{text-align:center;font-size:.72rem;color:#777;margin-top:8px}

.exp-tools{position:sticky;top:0;z-index:25;background:var(--paper);padding:12px 0;border-bottom:1px solid var(--line2);margin-bottom:14px}

.menu-card{display:flex;align-items:center;gap:16px;padding:20px 18px;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;cursor:pointer}
.menu-card .mc-ic{flex:none;width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.7rem}
.menu-card .mc-t{font-weight:800;font-size:1.15rem}
.menu-card .mc-s{color:var(--ink2);font-size:.85rem;margin-top:2px}
.menu-card .mc-arrow{font-size:1.4rem;color:var(--ink2)}
.fab-left{left:18px;right:auto;inset-inline-start:auto;transform:none;min-width:0;width:auto;padding:12px 20px}
.searchbar{position:relative;margin-bottom:14px}
.searchbar input{padding-inline-start:42px}
.searchbar .si{position:absolute;inset-inline-start:14px;top:50%;transform:translateY(-50%);color:var(--ink2);font-size:1.05rem;pointer-events:none}
.price-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.price-line .pl-price{width:120px;flex:none}
.totals{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.totals .tr{display:flex;justify-content:space-between;padding:5px 0;font-variant-numeric:tabular-nums}
.totals .tr.grand{border-top:2px solid var(--line);margin-top:6px;padding-top:12px;font-weight:800;font-size:1.15rem}

.qtable{width:100%;border-collapse:collapse;direction:rtl}
.qtable th,.qtable td{border:1px solid #cfd4de;padding:5px 7px;font-size:.8rem;text-align:right;vertical-align:top}
.qtable th{background:#eef1f7;font-weight:800;color:#161a20;text-align:center}
.qtable td.num{text-align:center;font-variant-numeric:tabular-nums;white-space:nowrap}
.qtable .qdesc{font-weight:700;color:#161a20}
.qtable .qsub{font-size:.72rem;color:#555}
.qtable tr{break-inside:avoid}
.qtot{margin-top:10px;margin-inline-start:auto;width:min(300px,70%)}
.qtot .qr{display:flex;justify-content:space-between;padding:4px 2px;font-size:.9rem;font-variant-numeric:tabular-nums}
.qtot .qr.grand{border-top:2px solid #233f80;margin-top:4px;padding-top:8px;font-weight:800;font-size:1.1rem;color:#161a20}
.qterms{margin-top:14px;font-size:.72rem;color:#555;line-height:1.6;border-top:1px dashed #ccc;padding-top:8px}

/* ===== הדמיה ללקוח ===== */
.sim-stage{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:12px;margin-bottom:12px}
.sim-2d{width:100%;display:block;touch-action:none;border-radius:12px;background:var(--line2)}
.sim-3d{width:100%;height:340px;display:block;touch-action:none;border-radius:12px;background:var(--line2)}
.sim-3dwrap{position:relative}
.sim-3dwrap:fullscreen{background:#0d0f12;display:flex;align-items:center;justify-content:center}
.sim-3dwrap:fullscreen .sim-3d{height:100vh;width:100vw;border-radius:0}
.sim-ovl{position:absolute;top:10px;left:10px;display:flex;gap:8px}
.ovlbtn{width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.92);font-size:1.15rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.simdim{display:flex;align-items:center;gap:10px;margin:8px 0}
.simdim>span{width:48px;color:var(--ink2);font-size:.9rem}
.simdim input[type=range]{flex:1;accent-color:var(--acc)}
.simdim .num{width:76px;text-align:center}
.bigsws{display:flex;gap:10px;flex-wrap:wrap}
.bigsw{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:56px}
.bigsw i{display:block;width:46px;height:46px;border-radius:12px;border:2px solid var(--line);box-shadow:inset 0 0 0 2px rgba(255,255,255,.35)}
.bigsw.on i{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc)}
.bigsw span{font-size:.66rem;color:var(--ink2);text-align:center}
.klil-tabs{display:flex;gap:8px;flex-wrap:wrap}
.hview{position:fixed;inset:0;background:rgba(13,16,22,.74);z-index:400;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadein .15s ease}
.hview-card{background:#fff;border-radius:20px;padding:22px 20px 18px;max-width:min(92vw,540px);width:100%;position:relative;text-align:center;box-shadow:0 18px 60px rgba(0,0,0,.35)}
.hview-card img{width:100%;max-height:58vh;object-fit:contain}
.hview-name{font-weight:800;font-size:1.15rem;color:var(--ink);margin-top:10px}
.hview-sub{font-size:.8rem;color:var(--ink2);margin-top:2px}
.hview-x{position:absolute;top:10px;right:10px;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--surface);font-size:1rem;cursor:pointer;color:var(--ink)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.klil-tab{flex:1;min-width:100px;border:1.5px solid var(--line);background:var(--surface);border-radius:12px;padding:8px 6px;cursor:pointer;display:flex;flex-direction:column;gap:2px;align-items:center;font-family:inherit}
.klil-tab b{font-size:.92rem;color:var(--ink)}
.klil-tab span{font-size:.7rem;color:var(--ink2)}
.klil-tab.on{border-color:var(--acc);background:var(--line2)}
.sim-tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.sim-hint{font-size:.8rem;color:var(--ink2);margin-top:8px;text-align:center}
.sim-3d-wrap{position:relative;background:linear-gradient(180deg,#eef2f7,#dfe5ee);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
:root[data-theme="dark"] .sim-3d-wrap{background:linear-gradient(180deg,#20293a,#161d29)}
@media (prefers-color-scheme: dark){ .sim-3d-wrap{background:linear-gradient(180deg,#20293a,#161d29)} :root[data-theme="light"] .sim-3d-wrap{background:linear-gradient(180deg,#eef2f7,#dfe5ee)} }
.sim-3d{width:100%;height:340px;display:block;touch-action:none}
.sim-3d-badge{position:absolute;top:8px;inset-inline-start:12px;font-size:.72rem;color:var(--ink2);background:rgba(255,255,255,.6);padding:2px 10px;border-radius:99px}
:root[data-theme="dark"] .sim-3d-badge{background:rgba(0,0,0,.35)}
.sim-3d-fallback{padding:40px 16px;text-align:center;color:var(--ink2);font-size:.9rem}
.swatches{display:flex;flex-wrap:wrap;gap:8px;max-height:150px;overflow-y:auto;padding:4px 0}
.swatch{width:34px;height:34px;border-radius:9px;border:2px solid transparent;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.swatch.on{border-color:var(--acc);transform:scale(1.08)}
.hmodels{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hmodel{border:2px solid transparent;border-radius:12px;background:var(--line2);padding:6px 4px;text-align:center;cursor:pointer}
.hmodel.on{border-color:var(--acc);background:var(--pen-soft)}
.hmodel img{width:100%;height:38px;object-fit:contain;display:block}
.hmodel span{font-size:.7rem;color:var(--ink2);display:block;margin-top:2px}

@media print{
  body{background:#fff}
  #app{max-width:none;padding:0}
  .no-print{display:none !important}
  .sheet{border:none;box-shadow:none;border-radius:0;margin:0;max-width:none;width:auto;padding:0;page-break-after:always}
  .sheet:last-of-type{page-break-after:auto}
  .sheet .sk{color:#000}
  .sheet-head{border-color:#000}
  .cell{border-color:#555}
  .cell .cnum,.cell .ctype{color:#000}
  .cell .cbadge span{border-color:#000;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cell .cbadge span.bopen{background:#eee;border-color:#000;color:#000}
}
@media (prefers-reduced-motion: reduce){ *{transition:none !important;animation:none !important} }
</style>

<div id="app" dir="rtl"></div>

<script>
"use strict";
/* ================= DATA ================= */
const LS_KEY = "alum_projects_v1";

function itemAreaM2(it){
  const w=parseFloat(it.width)||0, h=parseFloat(it.height)||0;
  if(!w||!h) return 0;
  return it.unit==="mm" ? w*h/1e6 : w*h/1e4;
}
function itemUnitPrice(it, rate){
  if(it.priceOverride!==undefined && it.priceOverride!==null && String(it.priceOverride).trim()!=="")
    return Math.round(Number(it.priceOverride)||0);
  return Math.round(itemAreaM2(it)*(Number(rate)||0));
}
function money(n){ return "₪" + Math.round(Number(n)||0).toLocaleString("en-US"); }
function quoteTotals(p){
  const rate=Number(p.pricePerM2)||0;
  let sub=0;
  (p.items||[]).forEach(it=>{ sub += itemUnitPrice(it,rate)*(Number(it.qty)||1); });
  sub=Math.round(sub);
  const vatRate = p.vatEnabled===false ? 0 : (p.vatRate!=null?Number(p.vatRate):(DB.settings.vatRate!=null?Number(DB.settings.vatRate):18));
  const vat = Math.round(sub*vatRate/100);
  return {sub, vatRate, vat, total: sub+vat};
}
function dimsText(it){
  if(!it.width && !it.height) return "—";
  return (it.height||"?")+" × "+(it.width||"?")+" "+unitName(it.unit);
}

/* ================= SKETCH SVG ================= */
function sketchSVG(it, w){
  w = w || 250;
  const T = TYPE(it.type);
  const pst = PSTYLE[(PROF(it.profile)||{}).style] || PSTYLE.standard;
  const W=274, H=250;
  // frame proportions follow the real width:height ratio, centered in a fixed box
  const boxX=34, boxW=192, boxY=28, boxH=182;
  const rw=parseFloat(it.width), rh=parseFloat(it.height);
  let FW=boxW, FH=boxH;
  if(rw>0 && rh>0){
    const aspect=Math.max(0.4,Math.min(2.5, rw/rh));
    if(aspect >= boxW/boxH){ FW=boxW; FH=Math.round(boxW/aspect); }
    else { FH=boxH; FW=Math.round(boxH*aspect); }
  }
  const FX=Math.round(boxX+(boxW-FW)/2), FY=Math.round(boxY+(boxH-FH)/2);
  const P=[];
  const ln=(x1,y1,x2,y2,extra)=>P.push('<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"'+(extra||"")+'/>');
  const faint=' stroke-width="1.4" opacity="0.75"';

  // frame — double line, gap according to the selected profile series
  P.push('<rect x="'+FX+'" y="'+FY+'" width="'+FW+'" height="'+FH+'" rx="3"/>');
  P.push('<rect x="'+(FX+pst.gap)+'" y="'+(FY+pst.gap)+'" width="'+(FW-2*pst.gap)+'" height="'+(FH-2*pst.gap)+'" rx="2" stroke-width="'+Math.max(1.2,pst.sw*0.6)+'"/>');

  let top=FY, bot=FY+FH;

  // roller drum (type 3) / roller box (9/10/11)
  if(T.roller){
    const bh=38;
    ln(FX, FY+bh, FX+FW, FY+bh);
    P.push('<circle cx="'+(FX+16)+'" cy="'+(FY+19)+'" r="11" fill="none"/>');
    P.push('<circle cx="'+(FX+FW-16)+'" cy="'+(FY+19)+'" r="11" fill="none"/>');
    ln(FX+27, FY+11, FX+FW-27, FY+11, faint);
    top = FY+bh;
  }
  if(T.rollerBox){
    const bh=28;
    ln(FX, FY+bh, FX+FW, FY+bh);
    top = FY+bh;
  }
  // universal shutter box (add-on to any non-roller type)
  const userBox = it.box && !T.roller && !T.rollerBox;
  if(userBox){
    const bh=28;
    ln(FX, FY+bh, FX+FW, FY+bh);
    top = FY+bh;
  }

  let areaBot = bot;
  if(T.fixedBottom){
    const fh=42;
    areaBot = bot - fh;
    ln(FX, areaBot, FX+FW, areaBot);
    xmark(P, FX+FW/2, (areaBot+bot)/2, 11);
  }

  // electric X / rope O in roller/shutter band, on the chosen side
  if(T.roller||T.rollerBox||userBox){
    const by = FY + (T.roller?38:28)/2;
    if(it.op==="electric"){
      const bx = it.elecSide==="left" ? FX+18 : FX+FW-18;
      xmark(P, bx, by, 7);
    } else if(it.op==="rope"){
      const bx = it.ropeSide==="left" ? FX+16 : FX+FW-16;
      P.push('<circle cx="'+bx+'" cy="'+by+'" r="6" fill="none"/>');
      ln(bx, by+6, bx, by+16);
    }
  }

  // slats
  if(T.roller){
    for(let y=top+14; y<bot-8; y+=15) ln(FX+8, y, FX+FW-8, y, faint);
  }
  if(T.slats){
    for(let y=top+12; y<areaBot-8; y+=14) ln(FX+6, y, FX+FW-6, y, faint);
  }

  // sashes + arrows
  if(T.sashes){
    const n=T.sashes, sw=FW/n, midY=(top+areaBot)/2;
    for(let i=1;i<n;i++) ln(FX+sw*i, top, FX+sw*i, areaBot, ' stroke-width="'+pst.div+'"');
    const cx = i => FX+sw*i+sw/2;
    if(n===2){
      if(it.openDir==="toleft"){ arrow(P,cx(0),midY,"l"); arrow(P,cx(1),midY,"l"); }
      else if(it.openDir==="toright"){ arrow(P,cx(0),midY,"r"); arrow(P,cx(1),midY,"r"); }
      else { arrow(P,cx(0),midY,"r"); arrow(P,cx(1),midY,"l"); }
    } else {
      if(it.openDir==="flip"){ arrow(P,cx(0),midY,"r"); arrow(P,cx(1),midY,"lr"); arrow(P,cx(2),midY,"lr"); }
      else { arrow(P,cx(0),midY,"lr"); arrow(P,cx(1),midY,"lr"); arrow(P,cx(2),midY,"l"); }
    }
  }

  // belgian glazing bars (1700/4300/4350/4100/7100/7300)
  if(pst.bars && !T.slats && !T.roller){
    const barAttr=' stroke-width="1.3" opacity="0.85"';
    const y1=top+(areaBot-top)/3, y2=top+2*(areaBot-top)/3;
    if(T.sashes){
      const n=T.sashes, bw=FW/n;
      for(let i=0;i<n;i++){
        ln(FX+bw*i+5, y1, FX+bw*(i+1)-5, y1, barAttr);
        ln(FX+bw*i+5, y2, FX+bw*(i+1)-5, y2, barAttr);
      }
    } else {
      ln(FX+6, y1, FX+FW-6, y1, barAttr);
      ln(FX+6, y2, FX+FW-6, y2, barAttr);
    }
  }

  // hinges
  if(T.hinge==="side" || T.hinge==="dreikipp"){
    const hs = it.handleSide==="left" ? "left" : "right";
    const apexX = hs==="left" ? FX : FX+FW;
    const fromX = hs==="left" ? FX+FW : FX;
    const midY=(top+areaBot)/2;
    ln(fromX, top, apexX, midY);
    ln(fromX, areaBot, apexX, midY);
  }
  if(T.hinge==="kipp" || T.hinge==="dreikipp"){
    ln(FX, top, FX+FW/2, areaBot);
    ln(FX+FW, top, FX+FW/2, areaBot);
  }
  if(T.hinge && T.hinge!=="kipp"){
    const hx = it.handleSide==="left" ? FX+8 : FX+FW-20;
    P.push('<text x="'+hx+'" y="'+(areaBot-8)+'" font-size="17" font-weight="700" fill="currentColor" stroke="none">ר</text>');
  }

  if(T.fixedAll){
    ln(FX, FY, FX+FW, FY+FH);
    ln(FX+FW, FY, FX, FY+FH);
  }

  // universal division grid (extra mullions) — cols x rows
  const dCols=Math.max(1,Math.min(8,Number(it.cols)||1));
  const dRows=Math.max(1,Math.min(6,Number(it.rows)||1));
  if(dCols>1 || dRows>1){
    const dAttr=' stroke-width="'+pst.div+'"';
    for(let i=1;i<dCols;i++){ const x=FX+FW*i/dCols; ln(x, top, x, areaBot, dAttr); }
    for(let j=1;j<dRows;j++){ const y=top+(areaBot-top)*j/dRows; ln(FX, y, FX+FW, y, dAttr); }
  }

  // rails (מסילות) + mesh (רשת) notation, top-right — mesh centered above the rails.
  // stays clear of the centered top-halbashot caret even when the frame is narrow.
  const railN = T.sashes||0;
  if(railN>0 || it.mesh){
    const dw=11, gp=4, thick=' stroke-width="2.6"';
    const total = railN>0 ? railN*dw+(railN-1)*gp : dw;
    let rEdge = FX+FW-13;
    if(it.hal && it.hal.top){          // keep the whole mark right of the caret
      const minRight = (FX+FW/2)+9+6+total;
      if(rEdge < minRight) rEdge = minRight;
    }
    rEdge = Math.min(rEdge, W-6);      // never leave the drawing
    const railLeft = rEdge - total;
    if(railN>0){
      const y=FY-7;
      for(let k=0;k<railN;k++){ const x2=rEdge-k*(dw+gp); ln(x2-dw,y,x2,y,thick); }
    }
    if(it.mesh){
      const cx = railN>0 ? (rEdge+railLeft)/2 : rEdge-dw/2;
      ln(cx-dw/2, FY-16, cx+dw/2, FY-16, thick);
    }
  }

  // halbashot carets
  const h=it.hal||{};
  if(h.top)   P.push('<polyline points="'+(FX+FW/2-9)+','+(FY-4)+' '+(FX+FW/2)+','+(FY-13)+' '+(FX+FW/2+9)+','+(FY-4)+'" fill="none"/>');
  if(h.bottom)P.push('<polyline points="'+(FX+FW/2-9)+','+(bot+4)+' '+(FX+FW/2)+','+(bot+13)+' '+(FX+FW/2+9)+','+(bot+4)+'" fill="none"/>');
  if(h.right) P.push('<polyline points="'+(FX+FW+4)+','+(FY+FH/2-9)+' '+(FX+FW+13)+','+(FY+FH/2)+' '+(FX+FW+4)+','+(FY+FH/2+9)+'" fill="none"/>');
  if(h.left)  P.push('<polyline points="'+(FX-4)+','+(FY+FH/2-9)+' '+(FX-13)+','+(FY+FH/2)+' '+(FX-4)+','+(FY+FH/2+9)+'" fill="none"/>');

  // dimension labels — width below frame, height right of frame (vertical), hugging the frame edge
  if(String(it.width||"").trim()){
    const wy = Math.min(H-4, FY+FH + (h.bottom?26:13) + 12);
    P.push('<text x="'+(FX+FW/2)+'" y="'+wy+'" text-anchor="middle" font-size="15" font-weight="700" fill="currentColor" stroke="none">'+esc(it.width)+' '+esc(unitName(it.unit))+'</text>');
  }
  if(String(it.height||"").trim()){
    const hy = FY+FH/2, hx = Math.min(W-4, FX+FW + (h.right?26:14) + 8);
    P.push('<text transform="rotate(-90 '+hx+' '+hy+')" x="'+hx+'" y="'+hy+'" text-anchor="middle" font-size="15" font-weight="700" fill="currentColor" stroke="none">'+esc(it.height)+' '+esc(unitName(it.unit))+'</text>');
  }

  return '<span class="sk"><svg viewBox="0 0 '+W+' '+H+'" width="'+w+'" height="'+Math.round(w*H/W)+'" '
    +'stroke="currentColor" fill="none" stroke-width="'+pst.sw+'" stroke-linecap="round" stroke-linejoin="round">'
    +P.join("")+'</svg></span>';
}
function xmark(P,x,y,s){
  P.push('<line x1="'+(x-s)+'" y1="'+(y-s)+'" x2="'+(x+s)+'" y2="'+(y+s)+'"/>');
  P.push('<line x1="'+(x+s)+'" y1="'+(y-s)+'" x2="'+(x-s)+'" y2="'+(y+s)+'"/>');
}
function arrow(P,cx,cy,dir){
  const len=26, x1=cx-len/2, x2=cx+len/2, a=5;
  P.push('<line x1="'+x1+'" y1="'+cy+'" x2="'+x2+'" y2="'+cy+'"/>');
  if(dir==="r"||dir==="lr"){
    P.push('<polyline points="'+(x2-a)+','+(cy-a)+' '+x2+','+cy+' '+(x2-a)+','+(cy+a)+'" fill="none"/>');
  }
  if(dir==="l"||dir==="lr"){
    P.push('<polyline points="'+(x1+a)+','+(cy-a)+' '+x1+','+cy+' '+(x1+a)+','+(cy+a)+'" fill="none"/>');
  }
}

/* ================= HELPERS ================= */
const unitName = u => u==="mm" ? "מ\"מ" : "ס\"מ";
function dimsHTML(it, big){
  if(!it.width && !it.height) return '<span class="muted">ללא מידות</span>';
  /* בעברית (RTL) האיבר הראשון מוצג מימין — גובה מימין, רוחב משמאל */
  return '<span class="num" dir="rtl">'+esc(it.height||"?")+' × '+esc(it.width||"?")+'</span> <span class="u">'+unitName(it.unit)+'</span>';
}
function measureBadge(it){
  return it.measureType==="opening"
    ? '<span class="bopen">מידת פתח — ללא הורדה</span>'
    : '<span>מידה לייצור</span>';
}
function profileText(it){
  if(it.profile==="other") return it.profileOther ? "סדרה "+it.profileOther : "";
  const pr = PROF(it.profile);
  if(!pr) return it.profile ? "סדרה "+it.profile : "";
  return "סדרה "+pr.code+" ("+pr.desc.split("—")[0].trim()+")";
}
function hasBox(it){ const T=TYPE(it.type); return !!(T.roller || T.rollerBox || it.box); }
function opText(it){
  if(!hasBox(it)) return "";
  const pre = TYPE(it.type).roller||TYPE(it.type).rollerBox ? "גלילה" : "ארגז תריס";
  if(it.op==="rope") return pre+": חבל · צד "+(it.ropeSide==="left"?"שמאל":"ימין");
  return pre+": חשמל · צד "+(it.elecSide==="left"?"שמאל":"ימין");
}
function halText(it){
  const h=it.hal||{}, arr=[];
  if(h.top)arr.push("למעלה"); if(h.bottom)arr.push("למטה"); if(h.right)arr.push("ימין"); if(h.left)arr.push("שמאל");
  return arr.length ? "הלבשות: "+arr.join(", ") : "ללא הלבשות";
}
/* פריטי גלילה / ארגז תריס מחייבים עובי קיר */
function needsWall(it){ return hasBox(it); }
/* טקסט חלוקה */
function divText(it){
  const c=Math.max(1,Number(it.cols)||1), r=Math.max(1,Number(it.rows)||1);
  return (c>1||r>1) ? "חלוקה: "+c+"×"+r+" (רוחב×גובה)" : "";
}
/* אילו נתוני חובה חסרים בפריט */
function missingList(it){
  const m=[];
  if(!String(it.width||"").trim())  m.push("רוחב");
  if(!String(it.height||"").trim()) m.push("גובה");
  if(needsWall(it) && !String(it.wallDepth||"").trim()) m.push("עובי קיר (לארגז התריס)");
  if(TYPE(it.type).rail && !it.railH) m.push("גובה מסילה");
  return m;
}
function todayISO(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
/* לתצוגה: dd/mm/yyyy; תומך גם בתאריכים ישנים שהוזנו ידנית */
function fmtDate(s){
  s=String(s||"");
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? m[3]+"/"+m[2]+"/"+m[1] : s;
}
/* לשדה בורר-תאריך: yyyy-mm-dd */
function toInputDate(s){
  s=String(s||"");
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m ? m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0") : "";
}

/* ================= DIALOGS — תיבות שיח מעוצבות במקום confirm/alert ================= */
function uiDialog(opts){
  return new Promise(res=>{
    const ov=document.createElement("div");
    ov.className="modal-overlay";
    ov.innerHTML='<div class="modal" role="dialog" aria-modal="true" dir="rtl">'
      +(opts.title?'<h3>'+esc(opts.title)+'</h3>':'')
      +'<div class="msg">'+esc(opts.msg)+'</div>'
      +'<div class="btns">'
      +'<button class="btn '+(opts.danger?'danger':'primary')+'" data-m="ok">'+esc(opts.ok||"אישור")+'</button>'
      +(opts.cancel?'<button class="btn" data-m="cancel">'+esc(opts.cancel)+'</button>':'')
      +'</div></div>';
    document.body.appendChild(ov);
    const onKey=e=>{ if(e.key==="Escape") close(false); };
    function close(v){ document.removeEventListener("keydown",onKey); ov.remove(); res(v); }
    ov.querySelector('[data-m="ok"]').onclick=()=>close(true);
    const c=ov.querySelector('[data-m="cancel"]'); if(c) c.onclick=()=>close(false);
    ov.addEventListener("click",e=>{ if(e.target===ov) close(false); });
    document.addEventListener("keydown",onKey);
    ov.querySelector('[data-m="ok"]').focus();
  });
}
const uiAlert=(msg,title)=>uiDialog({msg:msg,title:title,ok:"הבנתי"});
const uiConfirm=(msg,o)=>uiDialog(Object.assign({msg:msg,cancel:"ביטול"},o||{}));

/* ---------- item editor ---------- */
let draft = null, draftPid = null, draftIid = null, typeOpen = false;

/* טיוטה אוטומטית — רענון בטעות לא מוחק את מה שהוזן */
const DRAFT_KEY = "alum_draft_v1";
function persistDraft(){
  try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({pid:draftPid, iid:draftIid, draft:draft})); }catch(e){}
}
function clearDraft(){ try{ localStorage.removeItem(DRAFT_KEY); }catch(e){} }
function loadDraft(){ try{ return JSON.parse(localStorage.getItem(DRAFT_KEY)); }catch(e){ return null; } }

function viewItem(p, iid){
  draftPid = p.id;
  let restored = false;
  const s = loadDraft();
  if(iid==="new"){
    draft = newItem(1); draftIid = null; typeOpen = true;
    if(s && s.pid===p.id && !s.iid && s.draft){ draft=s.draft; typeOpen=false; restored=true; }
  }
  else {
    const src = p.items.find(x=>x.id===iid);
    if(!src){ return viewProject(p); }
    draft = JSON.parse(JSON.stringify(src)); draftIid = iid; typeOpen = false;
    if(s && s.pid===p.id && s.iid===iid && s.draft){ draft=s.draft; restored=true; }
  }
  const restoredBar = restored
    ? '<div class="card" style="border-color:var(--warn);background:var(--warn-bg)"><div class="rowline">'
      +'<div class="grow" style="color:var(--warn);font-weight:700">✓ שוחזרה טיוטה שלא נשמרה</div>'
      +'<button class="btn small" onclick="App.discardDraft()">התחל מחדש</button>'
      +'</div></div>'
    : '';
  return ''
  +'<div class="topbar"><button class="backbtn" onclick="nav(\'/p/'+p.id+'\')">→</button>'
  +'<div class="grow"><h1>'+(draftIid?"עריכת פריט":"פריט חדש")+'</h1><div class="sub">'+esc(pname(p))+'</div></div>'
  +(draftIid?'<button class="btn small danger" onclick="App.delItem()">מחק</button>':'')
  +'</div>'
  + restoredBar
  +'<div class="preview-wrap" id="preview"></div>'
  +'<div id="itemform"></div>'
  +'<button class="btn primary fab" onclick="App.saveItem()">✓ שמור פריט</button>';
}

function afterItemRender(){
  renderItemForm();
  renderPreview();
}
function renderPreview(){
  const el = document.getElementById("preview");
  if(el) el.innerHTML = sketchSVG(draft, 250);
}

function segBtn(on, label, fn){
  return '<button type="button" class="'+(on?"on":"")+'" onclick="'+fn+'">'+label+'</button>';
}
function stepper(label, val, min, max, key){
  val=Math.max(min,Math.min(max,Number(val)||min));
  return '<div class="field"><label>'+label+'</label><div class="rowline">'
    +'<button type="button" class="iconbtn" onclick="App.step(\''+key+'\',-1,'+min+','+max+')">−</button>'
    +'<div class="num grow" style="text-align:center;font-weight:800;font-size:1.2rem">'+val+'</div>'
    +'<button type="button" class="iconbtn" onclick="App.step(\''+key+'\',1,'+min+','+max+')">+</button>'
    +'</div></div>';
}

function renderItemForm(){
  const T = TYPE(draft.type);
  const f = document.getElementById("itemform");
  if(!f) return;
  let html = "";

  /* type picker */
  html += '<div class="card"><label>סוג הפריט</label>';
  if(typeOpen){
    html += '<div class="typegrid">'+TYPES.map(t=>{
      const demo = Object.assign(newItem(t.id), {handleSide:"left"});
      return '<button type="button" class="typecard '+(t.id===draft.type?"on":"")+'" onclick="App.setType('+t.id+')">'
        +sketchSVG(demo,74)+'<span class="tnum">'+t.id+'</span><span class="tname">'+t.name+'</span></button>';
    }).join("")+'</div>';
  } else {
    html += '<div class="rowline"><div class="grow"><b>'+T.id+'. '+T.name+'</b></div>'
      +'<button type="button" class="btn small" onclick="App.openTypes()">החלף סוג</button></div>';
  }
  html += '</div>';

  /* location */
  html += '<div class="card">'
    +'<div class="field"><label>מיקום בבית</label>'
    +'<input list="locs" value="'+esc(draft.location)+'" oninput="App.f(\'location\',this.value)" placeholder="למשל: סלון, ממ&quot;ד...">'
    +'<datalist id="locs">'+LOC_SUGGEST.map(l=>'<option value="'+l+'">').join("")+'</datalist></div>'

  /* dims */
    +'<div class="three">'
    +'<div class="field"><label>רוחב</label><input class="num" inputmode="decimal" value="'+esc(draft.width)+'" oninput="App.f(\'width\',this.value)"></div>'
    +'<div class="field"><label>גובה</label><input class="num" inputmode="decimal" value="'+esc(draft.height)+'" oninput="App.f(\'height\',this.value)"></div>'
    +'<div class="field"><label>יחידות</label><div class="seg">'
    +segBtn(draft.unit==="cm","ס\"מ","App.f('unit','cm')")
    +segBtn(draft.unit==="mm","מ\"מ","App.f('unit','mm')")
    +'</div></div></div>'

  /* wall thickness — required for roller-shutter items (sizing the shutter box) */
    +(needsWall(draft)
      ? '<div class="field" style="max-width:240px"><label style="color:var(--danger)">עובי קיר — חובה (לקביעת ארגז התריס)</label>'
        +'<input class="num" inputmode="decimal" value="'+esc(draft.wallDepth)+'" oninput="App.f(\'wallDepth\',this.value)" placeholder="'+unitName(draft.unit)+'"></div>'
      : '')

  /* measure type — prominent */
    +'<div class="measure-box"><label>⚠ סוג המידה — חובה לוודא לפני שליחה ליצרן</label>'
    +'<div class="seg big">'
    +segBtn(draft.measureType==="production","מידה לייצור","App.f('measureType','production')")
    +segBtn(draft.measureType==="opening","מידת פתח (ללא הורדה)","App.f('measureType','opening')")
    +'</div></div>'

    +'<div class="field" style="max-width:140px"><label>כמות</label><input class="num" inputmode="numeric" value="'+esc(draft.qty)+'" oninput="App.f(\'qty\',this.value)"></div>'
    +'</div>';

  /* conditional controls */
  let cond = "";
  if(T.slide){
    if(T.sashes===2){
      cond += '<div class="field"><label>כיוון פתיחה (הזזה)</label><div class="seg">'
        +segBtn(draft.openDir==="center","זו אל זו","App.f('openDir','center')")
        +segBtn(draft.openDir==="toright","שתיהן לימין","App.f('openDir','toright')")
        +segBtn(draft.openDir==="toleft","שתיהן לשמאל","App.f('openDir','toleft')")
        +'</div></div>';
    } else if(T.sashes===3){
      cond += '<div class="field"><label>כיוון פתיחה (הזזה)</label><div class="seg">'
        +segBtn(draft.openDir!=="flip","רגיל","App.f('openDir','std')")
        +segBtn(draft.openDir==="flip","הפוך (מראה)","App.f('openDir','flip')")
        +'</div></div>';
    }
  }
  if(T.hinge && T.hinge!=="kipp"){
    cond += '<div class="field"><label>צד ידית</label><div class="seg">'
      +segBtn(draft.handleSide==="right","ימין","App.f('handleSide','right')")
      +segBtn(draft.handleSide==="left","שמאל","App.f('handleSide','left')")
      +'</div></div>';
  }
  if(T.rail){
    cond += '<div class="field"><label style="color:var(--danger)">גובה מסילה — חובה</label><div class="seg">'
      +segBtn(draft.railH==="2.8","2.8 ס\"מ","App.f('railH','2.8')")
      +segBtn(draft.railH==="1.8","1.8 ס\"מ","App.f('railH','1.8')")
      +'</div></div>';
  }
  if(T.opSel){
    cond += '<div class="field"><label>הפעלת הגלילה</label><div class="seg">'
      +segBtn(draft.op==="electric","חשמל","App.f('op','electric')")
      +segBtn(draft.op==="rope","חבל","App.f('op','rope')")
      +'</div></div>';
    if(draft.op==="electric"){
      cond += '<div class="field"><label>צד החשמל (מסומן X בשרטוט)</label><div class="seg">'
        +segBtn(draft.elecSide==="right","ימין","App.f('elecSide','right')")
        +segBtn(draft.elecSide==="left","שמאל","App.f('elecSide','left')")
        +'</div></div>';
    }
    if(draft.op==="rope"){
      cond += '<div class="field"><label>צד החבל (מסומן בשרטוט)</label><div class="seg">'
        +segBtn(draft.ropeSide!=="left","ימין","App.f('ropeSide','right')")
        +segBtn(draft.ropeSide==="left","שמאל","App.f('ropeSide','left')")
        +'</div></div>';
    }
  }
  cond += '<div class="field"><label>רשת</label><div class="seg">'
    +segBtn(!!draft.mesh,"עם רשת","App.f('mesh',true)")
    +segBtn(!draft.mesh,"בלי רשת","App.f('mesh',false)")
    +'</div></div>';

  /* universal shutter box — for any type that isn't already a roller */
  if(!T.roller && !T.rollerBox){
    cond += '<div class="field"><label>ארגז תריס</label><div class="seg">'
      +segBtn(!draft.box,"בלי","App.f('box',false)")
      +segBtn(!!draft.box,"עם ארגז","App.f('box',true)")
      +'</div></div>';
    if(draft.box){
      cond += '<div class="field"><label>הפעלת התריס</label><div class="seg">'
        +segBtn(draft.op==="electric","חשמל","App.f('op','electric')")
        +segBtn(draft.op==="rope","חבל","App.f('op','rope')")
        +'</div></div>';
      if(draft.op==="electric"){
        cond += '<div class="field"><label>צד החשמל (מסומן X בשרטוט)</label><div class="seg">'
          +segBtn(draft.elecSide==="right","ימין","App.f('elecSide','right')")
          +segBtn(draft.elecSide==="left","שמאל","App.f('elecSide','left')")
          +'</div></div>';
      }
      if(draft.op==="rope"){
        cond += '<div class="field"><label>צד החבל (מסומן בשרטוט)</label><div class="seg">'
          +segBtn(draft.ropeSide!=="left","ימין","App.f('ropeSide','right')")
          +segBtn(draft.ropeSide==="left","שמאל","App.f('ropeSide','left')")
          +'</div></div>';
      }
    }
  }

  /* universal division (mullion grid) */
  cond += '<div class="two">'
    +stepper("חלוקה לרוחב (עמודות)",draft.cols,1,8,"cols")
    +stepper("חלוקה לגובה (שורות)",draft.rows,1,6,"rows")
    +'</div>';

  cond += '<div class="field"><label>הלבשות (חיצים בשרטוט)</label><div class="chips">'
    +'<button type="button" class="chip '+(draft.hal.top?"on":"")+'" onclick="App.hal(\'top\')">למעלה</button>'
    +'<button type="button" class="chip '+(draft.hal.bottom?"on":"")+'" onclick="App.hal(\'bottom\')">למטה</button>'
    +'<button type="button" class="chip '+(draft.hal.right?"on":"")+'" onclick="App.hal(\'right\')">ימין</button>'
    +'<button type="button" class="chip '+(draft.hal.left?"on":"")+'" onclick="App.hal(\'left\')">שמאל</button>'
    +'</div></div>';
  html += '<div class="card">'+cond+'</div>';

  /* profile / color / glass */
  const selProf = PROF(draft.profile);
  let profNote = "";
  if(selProf){
    profNote = '<div class="muted" style="margin-top:6px">'+selProf.desc+'</div>';
    if(T.slide && selProf.kind==="hinge")
      profNote += '<div style="color:var(--danger);font-size:.85rem;font-weight:700;margin-top:4px">⚠ סדרה '+selProf.code+' היא סדרת ציר/פתיחה — הפריט שבחרת הוא הזזה. לוודא לפני שליחה.</div>';
    if(T.hinge && selProf.kind==="slide")
      profNote += '<div style="color:var(--danger);font-size:.85rem;font-weight:700;margin-top:4px">⚠ סדרה '+selProf.code+' היא סדרת הזזה — הפריט שבחרת הוא ציר/קיפ. לוודא לפני שליחה.</div>';
  }
  html += '<div class="card">'
    +'<div class="field"><label>סדרת פרופיל (קליל) — השרטוט מצויר לפי מראה הסדרה</label>'
    +'<select onchange="App.f(\'profile\',this.value)">'
    +'<option value="">— בחר סדרה —</option>'
    +PROFILES.map(pr=>'<option value="'+pr.code+'"'+(draft.profile===pr.code?" selected":"")+'>'+pr.code+' — '+pr.desc+'</option>').join("")
    +'<option value="other"'+(draft.profile==="other"?" selected":"")+'>אחר...</option>'
    +'</select>'+profNote+'</div>'
    +(draft.profile==="other"
      ? '<div class="field"><label>סדרה אחרת</label><input value="'+esc(draft.profileOther)+'" oninput="App.f(\'profileOther\',this.value)"></div>'
      : '')
    +'<div class="field colorbox"><label>גוון (מניפת קליל — חיפוש, או הקלדת גוון אחר)</label>'
    +'<input id="colorInput" value="'+esc(draft.color)+'" placeholder="חפש: שחור, לבן, 95F... או הקלד גוון חופשי"'
    +' oninput="App.colorFilter(this.value)" onfocus="App.colorFilter(this.value)">'
    +'<div class="colorlist" id="colorList" style="display:none"></div></div>'
    +'<div class="field"><label>זכוכית</label>'
    +'<input list="glasses" value="'+esc(draft.glass)+'" oninput="App.f(\'glass\',this.value)" placeholder="בחר או הקלד...">'
    +'<datalist id="glasses">'+GLASS_SUGGEST.map(g=>'<option value="'+g+'">').join("")+'</datalist></div>'
    +'<div class="field" style="max-width:220px"><label>עובי זיגוג (מ״מ)</label>'
    +'<input list="glazes" class="num" inputmode="decimal" value="'+esc(draft.glazeThick)+'" oninput="App.f(\'glazeThick\',this.value)" placeholder="למשל 24">'
    +'<datalist id="glazes">'+GLAZE_THICK.map(g=>'<option value="'+g+'">').join("")+'</datalist></div>'
    +'</div>';

  /* notes + photo */
  html += '<div class="card">'
    +'<div class="field"><label>הערות לפריט</label><textarea rows="2" oninput="App.f(\'notes\',this.value)">'+esc(draft.notes)+'</textarea></div>'
    +'<div class="field"><label>תמונה של הפתח (נכנסת לקובץ הפנימי בלבד)</label>'
    +'<div class="rowline">'
    +'<label class="btn small" style="margin:0">📷 צלם / העלה<input type="file" accept="image/*" capture="environment" style="display:none" onchange="App.photo(this)"></label>'
    +(draft.photo?'<button type="button" class="btn small danger" onclick="App.f(\'photo\',null);renderItemForm()">הסר תמונה</button>':'')
    +'</div>'
    +(draft.photo?'<img class="photo-thumb" style="margin-top:10px" src="'+draft.photo+'" alt="תמונת הפתח">':'')
    +'</div></div>'
    +'<div style="height:8px"></div>';

  f.innerHTML = html;
}

/* ---------- export ---------- */
let expOpts = {mode:"factory", perPage:9, showName:true};

function viewExport(p){
  const problems = [];
  p.items.forEach((it,i)=>{
    const m = missingList(it);
    if(m.length) problems.push({num:i+1, loc:it.location, m:m});
  });
  const blocked = problems.length>0 && expOpts.mode==="factory";
  const per = expOpts.perPage;
  const cols = per===9 ? 3 : 2;
  const pages = [];
  for(let i=0;i<p.items.length;i+=per) pages.push(p.items.slice(i,i+per));
  const skW = per===9 ? 150 : (per===6 ? 175 : 210);
  const internal = expOpts.mode==="internal";

  const sheets = pages.map((chunk,pi)=>{
    let head = "";
    if(pi===0){
      if(internal){
        head = '<div class="sheet-head"><h2>דף מדידות — '+esc(pname(p))+'</h2><div class="meta">'
          +(p.client?'<span>לקוח: <b>'+esc(p.client)+'</b></span>':'')
          +(p.phone?'<span>טל׳: <b class="num">'+esc(p.phone)+'</b></span>':'')
          +'<span>תאריך: <b class="num">'+esc(fmtDate(p.date))+'</b></span>'
          +(p.measurer?'<span>מודד: <b>'+esc(p.measurer)+'</b></span>':'')
          +'<span>סה"כ פריטים: <b class="num">'+p.items.length+'</b></span>'
          +(p.notes?'<span>הערות: '+esc(p.notes)+'</span>':'')
          +'</div></div>';
      } else {
        head = '<div class="sheet-head"><h2>הזמנת ייצור'+(expOpts.showName?" — "+esc(pname(p)):"")+'</h2><div class="meta">'
          +'<span>תאריך: <b class="num">'+esc(fmtDate(p.date||todayISO()))+'</b></span>'
          +'<span>סה"כ פריטים: <b class="num">'+p.items.length+'</b></span>'
          +'</div></div>';
      }
    }
    const cells = chunk.map(it=>{
      const T = TYPE(it.type);
      const info = [];
      const pt = profileText(it); if(pt) info.push("<b>"+esc(pt)+"</b>");
      if(it.color) info.push("גוון: <b>"+esc(it.color)+"</b>");
      if(it.glass) info.push("זכוכית: "+esc(it.glass));
      if(it.glazeThick) info.push("עובי זיגוג: "+esc(it.glazeThick)+" מ\"מ");
      if(T.rail && it.railH) info.push('גובה מסילה: <b class="num">'+esc(it.railH)+' ס"מ</b>');
      const dv=divText(it); if(dv) info.push("<b>"+dv+"</b>");
      info.push(it.mesh ? "רשת: כן" : "רשת: אין");
      const ot=opText(it); if(ot) info.push(ot);
      if(Number(it.qty)>1) info.push('כמות: <b class="num">×'+esc(it.qty)+"</b>");
      return '<div class="cell">'
        +'<div class="cellhead"><span class="cloc">מיקום בבית: <b class="num">'+esc(it.location||"—")+'</b></span></div>'
        +'<div class="ctype">'+T.name+'</div>'
        +'<div class="csk">'+sketchSVG(it,skW)+'</div>'
        +'<div class="cdims">'+dimsHTML(it)+'</div>'
        +(needsWall(it)
          ? '<div class="cdims" style="font-size:.8rem">עובי קיר: <span class="num">'+esc(it.wallDepth||"?")+'</span> <span class="u">'+unitName(it.unit)+'</span></div>'
          : '')
        +'<div class="cbadge">'+measureBadge(it)+'</div>'
        +'<div class="cinfo">'+info.join(" · ")+'</div>'
        +(it.notes?'<div class="cnote">'+esc(it.notes)+'</div>':'')
        +(internal&&it.photo?'<img src="'+it.photo+'" alt="">':'')
        +'</div>';
    }).join("");
    const strip = '<div class="sheet-top">'
      +'<span class="bsd">בס״ד</span>'
      +'<img class="sheet-logo" src="'+(DB.settings.logo||DEFAULT_LOGO)+'" alt="לוגו">'
      +'</div>';
    return '<div class="sheet">'+strip+head
      +'<div class="sheet-grid" style="grid-template-columns:repeat('+cols+',1fr)">'+cells+'</div>'
      +'<div class="sheet-foot">עמוד '+(pi+1)+' מתוך '+pages.length+'</div></div>';
  }).join("");

  return ''
  +'<div class="exp-tools no-print">'
  +'<div class="rowline" style="margin-bottom:10px"><button class="backbtn" onclick="nav(\'/p/'+p.id+'\')">→</button>'
  +'<div class="grow"><h1 style="font-size:1.1rem">קובץ ליצוא — '+esc(pname(p))+'</h1></div>'
  +(blocked
    ? '<button class="btn" disabled style="opacity:.45">🖨 הדפס / שמור PDF</button>'
    : '<button class="btn primary" onclick="window.print()">🖨 הדפס / שמור PDF</button>')
  +'</div>'
  +'<div class="two">'
  +'<div><label>ייעוד הקובץ</label><div class="seg">'
  +segBtn(expOpts.mode==="factory","ליצרן (נקי)","App.eo('mode','factory')")
  +segBtn(expOpts.mode==="internal","פנימי (מלא)","App.eo('mode','internal')")
  +'</div></div>'
  +'<div><label>פריטים בעמוד</label><div class="seg">'
  +segBtn(expOpts.perPage===4,"4","App.eo('perPage',4)")
  +segBtn(expOpts.perPage===6,"6","App.eo('perPage',6)")
  +segBtn(expOpts.perPage===9,"9","App.eo('perPage',9)")
  +'</div></div></div>'
  +(expOpts.mode==="factory"
    ? '<div style="margin-top:8px"><label class="chip '+(expOpts.showName?"on":"")+'" style="display:inline-flex;align-items:center" onclick="App.eo(\'showName\','+(!expOpts.showName)+')">'
      +(expOpts.showName?"✓ ":"")+'הצג כתובת (שם הפרויקט) בכותרת</label>'
      +' <span class="muted">היצרן רואה רק את הכתובת — בלי שם לקוח, טלפון ותמונות.</span></div>'
    : '<div class="muted" style="margin-top:8px">הקובץ הפנימי כולל את כל פרטי הלקוח והתמונות.</div>')
  +'</div>'
  +(problems.length
    ? '<div class="errbanner no-print"><b>'
      +(blocked ? '🚫 אי אפשר להפיק קובץ ליצרן — חסרים נתונים:' : '⚠ שים לב — חסרים נתונים:')+'</b>'
      +problems.map(pr=>'<div>חסר <b>'+pr.m.join(" + ")+'</b> בפריט מספר <b class="num">'+pr.num+'</b>'+(pr.loc?' ('+esc(pr.loc)+')':'')+'</div>').join("")
      +(blocked
        ? '<div style="margin-top:4px">חוזרים לפריט, משלימים את המידה — והכפתור ייפתח.</div>'
        : '<div style="margin-top:4px">קובץ פנימי אפשר להדפיס גם כך, אבל ליצרן זה ייחסם.</div>')
      +'</div>'
    : '')
  + sheets;
}

  +'<div class="card"><div class="two">'
  +'<div class="field" style="margin:0"><label>מחיר למ״ר (₪)</label><input class="num" inputmode="decimal" value="'+esc(p.pricePerM2||"")+'" oninput="App.qf(\''+p.id+'\',\'pricePerM2\',this.value)" placeholder="למשל 1200"></div>'
  +'<div class="field" style="margin:0"><label>מע״מ</label><div class="seg">'
  +segBtn(vatOn,"עם מע״מ","App.qf('"+p.id+"','vatEnabled',true)")
  +segBtn(!vatOn,"בלי","App.qf('"+p.id+"','vatEnabled',false)")
  +'</div></div>'

function simWingCount(){

function simFromItem(it){
  const T=TYPE(it.type);
  const cols=Math.max(1,Number(it.cols)||1), rows=Math.max(1,Number(it.rows)||1);
  const nCols=Math.max(cols, T.sashes||1);
  const v=[], h=[];
  for(let i=1;i<nCols;i++) v.push(i/nCols);
  for(let j=1;j<rows;j++) h.push({f:j/rows,w:-1});
  const gl = /חלב|אסיד|מנומר|צ'ינצ|סבתא|אורנ/.test(it.glass||"") ? "frost"
           : /ברונזה|אפור|גרפיט|כחול|טינטד|רפלק/.test(it.glass||"") ? "tint" : "clear";
  const nm=(T.name||"")+(it.type||"");
  return {
    kind: /דלת/.test(nm) ? "door" : /ויטרינ/.test(nm) ? "vitrina" : "window",
    wings: T.fixedAll ? 0 : Math.max(2, T.sashes||2),
    box: !!it.box || !!T.rollerBox,
    w: parseFloat(it.width) || (it.unit==="mm"?1200:120),
    h: parseFloat(it.height)|| (it.unit==="mm"?1000:100),

    color: it.color||"", glass: gl, handleSide: it.handleSide||"right",
    vLines:v, hLines:h
  };
}

/* ---------- 2D builder ---------- */
function simSnap(f){
  f=Math.max(0.08,Math.min(0.92,f));
  for(const s of [0.25,1/3,0.5,2/3,0.75]) if(Math.abs(f-s)<0.03) return s;
  return Math.round(f*50)/50;
}
function renderSim2D(){
  const svg=document.getElementById("sim2d"); if(!svg) return;
  const W=360,H=300, bx=30,by=24,bw=300,bh=248;
  const wcm=(sim.w>0?parseFloat(sim.w):120)||120, hcm=(sim.h>0?parseFloat(sim.h):100)||100;
  const boxCm=sim.box?SIM_BOX_CM:0;
  const aspect=Math.max(0.25,Math.min(4,wcm/(hcm+boxCm)));
  let TW=bw,TH=bh;
  if(aspect>=bw/bh){ TW=bw; TH=Math.round(bw/aspect); } else { TH=bh; TW=Math.round(bh*aspect); }
  const boxPx=boxCm?Math.round(TH*boxCm/(hcm+boxCm)):0;
  const FW=TW, FH=TH-boxPx;
  const FX=Math.round(bx+(bw-FW)/2), FY=Math.round(by+(bh-TH)/2)+boxPx;
  simGeo={FX,FY,FW,FH,W,H};
  const PF=PROF(sim.profile)||{}, fam=PF.style||"standard";
  /* רוחב קו-ראייה לחזית, מכויל לאופי הסדרות בקטלוג קליל (יחסי, לא מ"מ מדויק) */
  const SW={"1400":6,"9400":6,"2600":8,"5600":8,"7600":8,"1700":8,"4100":8,"4300":8,"4350":9,"7100":8,"7300":9,"4500":11,"5500":11,"7000":11,"9000":12,"2200":16,"9200":16};
  let fw=SW[sim.profile]||{minimal:7,standard:11,heavy:16,belgian:8}[fam]||11;
  const gap=2;
  let ssw=Math.max(5,Math.round(fw*0.85));
  /* בחלון צר/נמוך מכווצים את הפרופיל כדי שלא יבלע את הזכוכית */
  const k=Math.min(1,(Math.min(FW,FH)*0.22)/(fw+gap+ssw));
  fw=Math.max(4,fw*k); ssw=Math.max(4,ssw*k);
  const S=fw+gap+ssw;
  const col=colorToHex(sim.color);
  const cLL=shade(col,1.26), cL=shade(col,1.1), cD=shade(col,0.88), cDD=shade(col,0.62);
  const gx=FX+S, gy=FY+S, gw=FW-2*S, gh=FH-2*S;
  const tint = "rgba(150,190,210,0.12)"; /* זכוכית שקופה — גוון זכוכית לא רלוונטי להדמיה */
  const barW=Math.max(5,ssw*0.9);
  const A=[];
  const face='<stop offset="0" stop-color="'+cLL+'"/><stop offset="0.28" stop-color="'+cL+'"/><stop offset="0.6" stop-color="'+col+'"/><stop offset="0.92" stop-color="'+cD+'"/><stop offset="1" stop-color="'+cDD+'"/>';
  A.push('<defs>'
    +'<clipPath id="gclip"><rect x="'+gx+'" y="'+gy+'" width="'+gw+'" height="'+gh+'"/></clipPath>'
    +'<linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3f1ec"/><stop offset="1" stop-color="#ddd8cf"/></linearGradient>'
    +'<linearGradient id="mh" x1="0" y1="0" x2="0" y2="1">'+face+'</linearGradient>'
    +'<linearGradient id="mv" x1="0" y1="0" x2="1" y2="0">'+face+'</linearGradient>'
    +'<linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.22"/><stop offset="0.35" stop-color="#fff" stop-opacity="0.04"/><stop offset="0.7" stop-color="#fff" stop-opacity="0"/></linearGradient>'
    +'<linearGradient id="eT" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity="0.34"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>'
    +'<linearGradient id="eL" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0.30"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>'
    +'<linearGradient id="eB" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0.20"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>'
    +'<linearGradient id="eR" x1="1" y1="0" x2="0" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0.20"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient>'
    +'<filter id="winsh" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.28"/></filter>'
    +'<filter id="barsh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="1.4" dy="2.2" stdDeviation="1.4" flood-color="#000" flood-opacity="0.38"/></filter>'
    +'<filter id="hsh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.6" stdDeviation="1.1" flood-color="#000" flood-opacity="0.35"/></filter>'
    +'</defs>');
  /* קיר רקע — החלון מותקן, לא צף */

  sim.vLines.forEach((f,i)=>{ const x=FX+f*FW, on=simSel&&simSel.dir==="v"&&simSel.idx===i;
    A.push('<g filter="url(#barsh)"><rect x="'+(x-barW/2)+'" y="'+gy+'" width="'+barW+'" height="'+gh+'" fill="'+(on?"#e04f3f":"url(#mv)")+'"/></g>'); });
  /* צורות חופשיות שיושרו — קשת/מלבן/אליפסה, מודבקות על הזכוכית */
  (sim.shapes||[]).forEach((s,i)=>{
    const on=simSel&&simSel.dir==="s"&&simSel.idx===i;
    const stroke=on?"#e04f3f":col;
    const x0=FX+s.x0*FW, x1=FX+s.x1*FW, y0=FY+s.y0*FH, y1=FY+s.y1*FH;
    A.push('<g filter="url(#barsh)">');

    } else if(s.t==="ell"){
      A.push('<ellipse cx="'+((x0+x1)/2)+'" cy="'+((y0+y1)/2)+'" rx="'+((x1-x0)/2)+'" ry="'+((y1-y0)/2)+'" fill="none" stroke="'+stroke+'" stroke-width="'+barW+'"/>');
    } else {

    A.push('<line x1="'+x+'" y1="'+(y+h)+'" x2="'+(x+t)+'" y2="'+(y+h-t)+'" '+ml+'/>');

  };
  /* כנף פנימית + פס זיגוג סביב הזכוכית */

function simToLocal(e){
  const svg=document.getElementById("sim2d"); const r=svg.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*360, y=(e.clientY-r.top)/r.height*300;
  return {x,y};
}
function attachSim2DHandlers(){
  const svg=document.getElementById("sim2d"); if(!svg||svg._wired) return; svg._wired=true;
  let mode=null, startX=0, startY=0, dragRef=null, pts=[];
  svg.addEventListener("pointerdown",e=>{
    const p=simToLocal(e), g=simGeo; if(!g) return;
    startX=p.x; startY=p.y; pts=[[p.x,p.y]];
    // hit-test existing lines + shapes
    let hit=null;
    sim.vLines.forEach((f,i)=>{ if(Math.abs(p.x-(g.FX+f*g.FW))<9 && p.y>=g.FY && p.y<=g.FY+g.FH) hit={dir:"v",idx:i}; });
    sim.hLines.forEach((L,i)=>{
      const f=hlineF(L), wgi=hlineWing(L), n=simWingCount();
      let x0=g.FX, x1=g.FX+g.FW;
      if(wgi>=0){ const pw=g.FW/n; x0=g.FX+wgi*pw; x1=x0+pw; }
      if(Math.abs(p.y-(g.FY+f*g.FH))<9 && p.x>=x0 && p.x<=x1) hit={dir:"h",idx:i}; });
    (sim.shapes||[]).forEach((s,i)=>{
      const x0=g.FX+s.x0*g.FW, x1=g.FX+s.x1*g.FW, y0=g.FY+s.y0*g.FH, y1=g.FY+s.y1*g.FH;
      const nearV=(Math.abs(p.x-x0)<9||Math.abs(p.x-x1)<9)&&p.y>y0-9&&p.y<y1+9;
      const nearH=(Math.abs(p.y-y0)<9||Math.abs(p.y-y1)<9)&&p.x>x0-9&&p.x<x1+9;
      if(nearV||nearH) hit={dir:"s",idx:i}; });
    if(hit){ mode=(hit.dir==="s")?"sel":"drag"; dragRef=(hit.dir==="s")?null:hit; simSel=hit; renderSim2D(); }
    else { mode="draw"; }
    svg.setPointerCapture(e.pointerId);
  });
  svg.addEventListener("pointermove",e=>{
    if(mode==="draw"){
      const q=simToLocal(e), last=pts[pts.length-1];
      if(Math.hypot(q.x-last[0],q.y-last[1])>3) pts.push([q.x,q.y]);
      return;
    }
    if(mode!=="drag"||!dragRef) return;
    const p=simToLocal(e), g=simGeo;
    if(dragRef.dir==="v"){ sim.vLines[dragRef.idx]=simSnap((p.x-g.FX)/g.FW); }
    else { const L=sim.hLines[dragRef.idx];
      if(L&&L.f!==undefined) L.f=simSnap((p.y-g.FY)/g.FH);
      else sim.hLines[dragRef.idx]={f:simSnap((p.y-g.FY)/g.FH),w:-1}; }
    renderSim2D(); buildSimWindow();
  });
  svg.addEventListener("pointerup",e=>{
    const p=simToLocal(e), g=simGeo;
    if(mode==="draw"){
      let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;
      pts.forEach(q=>{ if(q[0]<mnx)mnx=q[0]; if(q[0]>mxx)mxx=q[0]; if(q[1]<mny)mny=q[1]; if(q[1]>mxy)mxy=q[1]; });
      const bw=mxx-mnx, bh=mxy-mny;
      if(bw>0.15*g.FW && bh>0.15*g.FH && pts.length>7){
        /* ציור חופשי → מזהים צורה ומיישרים אותה יפה בתוך הכנף */
        const n=simWingCount();
        const cxF=((mnx+mxx)/2-g.FX)/g.FW;
        const wgi = n>=2 ? Math.max(0,Math.min(n-1,Math.floor(cxF*n))) : -1;
        const pL = wgi>=0 ? wgi/n : 0, pR = wgi>=0 ? (wgi+1)/n : 1;
        let x0f=(mnx-g.FX)/g.FW, x1f=(mxx-g.FX)/g.FW;
        let y0f=(mny-g.FY)/g.FH, y1f=(mxy-g.FY)/g.FH;
        let mrg=((x0f-pL)+(pR-x1f))/2; mrg=Math.max(0.015,Math.round(mrg*50)/50);
        x0f=pL+mrg; x1f=pR-mrg;
        y0f=Math.max(0.02,Math.round(y0f*20)/20);
        y1f=y1f>0.9?0.98:Math.round(y1f*20)/20;
        if(y1f-y0f<0.1) y1f=Math.min(0.98,y0f+0.1);
        const st=pts[0], en=pts[pts.length-1], diag=Math.hypot(bw,bh);
        const closed=Math.hypot(st[0]-en[0],st[1]-en[1])<0.28*diag;
        let t="arch";
        if(closed){
          let hitC=0;
          [[mnx,mny],[mxx,mny],[mnx,mxy],[mxx,mxy]].forEach(c=>{
            let d=1e9; pts.forEach(q=>{ const dd=Math.hypot(q[0]-c[0],q[1]-c[1]); if(dd<d)d=dd; });
            if(d<0.16*diag) hitC++;
          });
          t = hitC>=3 ? "rect" : "ell";
        }
        sim.shapes=sim.shapes||[];
        sim.shapes.push({t:t,w:wgi,x0:x0f,x1:x1f,y0:y0f,y1:y1f});
        simSel={dir:"s",idx:sim.shapes.length-1};
        saveSim(); renderSim2D(); buildSimWindow();
      } else {
        const dx=Math.abs(p.x-startX), dy=Math.abs(p.y-startY);
        if(dx>6||dy>6){
          if(dy>=dx){ sim.vLines.push(simSnap((startX-g.FX)/g.FW)); simSel={dir:"v",idx:sim.vLines.length-1}; }
          else {
            /* קו רוחבי — רק על הכנף שבה צוירה התנועה */
            const n=simWingCount();
            const wgi = n>=2 ? Math.max(0,Math.min(n-1,Math.floor((startX-g.FX)/g.FW*n))) : -1;
            sim.hLines.push({f:simSnap((startY-g.FY)/g.FH),w:wgi});
            simSel={dir:"h",idx:sim.hLines.length-1};
          }
          saveSim(); renderSim2D(); buildSimWindow();
        } else if(simSel){
          /* טאפ בצד — מנקה את הסימון האדום ומשאיר את הקו */
          simSel=null; renderSim2D();
        }
      }
    } else if(mode==="drag"){ saveSim(); }
    mode=null; dragRef=null;
  });
}

/* פרמטרים ריאליים לכל משפחת פרופיל: face=קו-ראייה, depth=עומק, sash=מסגרת-כנף */
const FAM3D={
  minimal:  {face:0.055, depth:0.16, sash:0.05, bead:0.02},
  standard: {face:0.10,  depth:0.20, sash:0.075,bead:0.025},
  heavy:    {face:0.15,  depth:0.28, sash:0.11, bead:0.03},
  belgian:  {face:0.05,  depth:0.15, sash:0.045,bead:0.02, bars:true}
};
/* --- הטכניקה של קונפיגורטור קליל, בגרסה פרוצדורלית: חתך פרופיל אמיתי שנסחף
   סביב מלבן. כל נקודת-חתך מייצרת לולאה מלבנית בהזחה שלה — פינות 45° נוצרות
   מעצמן, וחתך הפרופיל נשאר מדויק בכל מידה (בלי מתיחה ובלי morph targets). --- */
function sweepRing(contour,W,H,mat){
  const pos=[];
  const quad=(v0,v1,v2,v3)=>{ pos.push(v0[0],v0[1],v0[2],v1[0],v1[1],v1[2],v2[0],v2[1],v2[2], v0[0],v0[1],v0[2],v2[0],v2[1],v2[2],v3[0],v3[1],v3[2]); };
  for(let i=0;i<contour.length;i++){
    const a=contour[i], b=contour[(i+1)%contour.length];
    const ax=W/2-a[0], ay=H/2-a[0], bx=W/2-b[0], by=H/2-b[0], za=a[1], zb=b[1];
    quad([-ax,ay,za],[ax,ay,za],[bx,by,zb],[-bx,by,zb]);         // עליון
    quad([ax,ay,za],[ax,-ay,za],[bx,-by,zb],[bx,by,zb]);         // ימין
    quad([ax,-ay,za],[-ax,-ay,za],[-bx,-by,zb],[bx,-by,zb]);     // תחתון
    quad([-ax,-ay,za],[-ax,ay,za],[-bx,by,zb],[-bx,-by,zb]);     // שמאל
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
  geo.computeVertexNormals();
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  return mesh;
}
/* חתך משקוף: פאה קדמית עם שיפוע, מדרגת-רובד פנימית לכנף */
function frameContour(f,D){ const d=D/2; return [
  [0,-d],[0,d],[f*0.16,d],[f*0.22,d*0.84],[f*0.84,d*0.84],[f*0.92,d*0.45],[f,d*0.36],[f,-d]
];}
/* חתך כנף: פאה עם פס-זיגוג מדורג לכיוון הזכוכית */
function sashContour(s,D){ const d=D/2; return [
  [0,-d],[0,d],[s*0.14,d],[s*0.2,d*0.78],[s*0.78,d*0.78],[s*0.88,d*0.28],[s,d*0.2],[s,-d]
];}
let simViewTex=null, simWallTex=null, simFloorTex=null, simPaversTex=null, simStuccoTex=null;

function simRepeatTex(file,rx,ry){

/* קיר טרוורטין: UV של ExtrudeGeometry = מטרים, אריח כל ~1.8מ'; רצפת פרקט: מישור פנים */

function buildSimWindow(){
  if(!sim3d) return;
  const g=sim3d.group; simDisposeGroup(g);
  const P=PROF(sim.profile)||{};
  const fam=P.style||"standard";
  const simKind=sim.kind||"window";
  /* דלת = כנפי ציר עד הרצפה; ויטרינה = הזזה עד הרצפה; חלון = לפי הפרופיל */
  const kind = simKind==="door" ? "hinge" : simKind==="vitrina" ? "slide" : (P.kind||"slide");
  const FP=FAM3D[fam]||FAM3D.standard;
  /* קנה מידה פיזי: יחידה אחת = מטר; חדר בגובה 2.80 */
  const FLOOR=-1.35, CEIL=1.45;
  const boxH=sim.box?SIM_BOX_CM/100:0;
  const Wd=Math.min(4.0,Math.max(0.5,(parseFloat(sim.w)||120)/100));
  const Hd=Math.min(2.7-boxH,Math.max(0.5,(parseFloat(sim.h)||100)/100));
  const sill = simKind==="window" ? Math.max(0.05,Math.min(0.9,(CEIL-FLOOR)-Hd-boxH-0.08)) : 0;
  const yC=FLOOR+sill+Hd/2;
  const D=FP.depth, ff=FP.face, ss=FP.sash;
  const base=new THREE.Color(colorToHex(sim.color));
  const alu=new THREE.MeshStandardMaterial({color:base.clone(),metalness:0.8,roughness:0.36,envMapIntensity:1.1});
  const aluD=new THREE.MeshStandardMaterial({color:base.clone().multiplyScalar(0.76),metalness:0.8,roughness:0.46,envMapIntensity:1.0});
  // זכוכית שקופה ומשקפת סביבה (בלי transmission, לרינדור אמין בכל מכשיר)
  const glassMat=new THREE.MeshStandardMaterial({color:0xdfeef1,transparent:true,opacity:0.22,metalness:0.5,roughness:0.05,envMapIntensity:1.5,side:THREE.DoubleSide});
  /* המכלול (משקוף+כנפיים) יושב בגובה הנכון בקיר */
  const win=new THREE.Group(); win.position.y=yC; g.add(win);
  const box=(w,h,d,x,y,z,m)=>{ const me=new THREE.Mesh(new THREE.BoxGeometry(Math.max(0.012,w),Math.max(0.012,h),Math.max(0.012,d)),m||alu); me.position.set(x,y,z); me.castShadow=true; me.receiveShadow=true; win.add(me); };
  // ----- חדר: קיר עם פתח במקום ובמידות האמיתיים, רצפה, ונוף בחוץ -----
  const wallMat=new THREE.MeshStandardMaterial({color:0xffffff,map:simGetWallTex(),roughness:0.9,metalness:0,envMapIntensity:0.12});
  const wShape=new THREE.Shape();
  wShape.moveTo(-4.2,FLOOR-0.01); wShape.lineTo(4.2,FLOOR-0.01); wShape.lineTo(4.2,2.5); wShape.lineTo(-4.2,2.5); wShape.closePath();
  const yB=FLOOR+sill, yT=yB+Hd+boxH;
  const hole=new THREE.Path();
  hole.moveTo(-Wd/2,yB); hole.lineTo(Wd/2,yB); hole.lineTo(Wd/2,yT); hole.lineTo(-Wd/2,yT); hole.closePath();
  wShape.holes.push(hole);
  const wall=new THREE.Mesh(new THREE.ExtrudeGeometry(wShape,{depth:0.24,bevelEnabled:false}),wallMat);
  wall.position.z=-0.26; wall.receiveShadow=true; g.add(wall);
  /* חיפוי חוץ — שליכט צבעוני; הפתח החיצוני בגובה החלון בלבד:
     ארגז התריס מוסתר בקיר ומבחוץ לא רואים אותו בכלל */
  const sShape=new THREE.Shape();
  sShape.moveTo(-4.2,FLOOR-0.01); sShape.lineTo(4.2,FLOOR-0.01); sShape.lineTo(4.2,2.5); sShape.lineTo(-4.2,2.5); sShape.closePath();
  const sHole=new THREE.Path();
  sHole.moveTo(-Wd/2,yB); sHole.lineTo(Wd/2,yB); sHole.lineTo(Wd/2,yB+Hd); sHole.lineTo(-Wd/2,yB+Hd); sHole.closePath();
  sShape.holes.push(sHole);
  const stucco=new THREE.Mesh(new THREE.ExtrudeGeometry(sShape,{depth:0.012,bevelEnabled:false}),
    new THREE.MeshStandardMaterial({color:0xffffff,map:simGetStuccoTex(),roughness:0.95,metalness:0,envMapIntensity:0.1}));
  stucco.position.z=-0.274; stucco.receiveShadow=true; g.add(stucco);
  /* סגירת עומק מעל המשקוף בצד החוץ כשיש ארגז — כדי שלא ייראה חלל בזווית */
  if(boxH>0){
    const lint=new THREE.Mesh(new THREE.BoxGeometry(Wd,boxH,0.16),wallMat);
    lint.position.set(0,yC+Hd/2+boxH/2,-0.18); lint.receiveShadow=true; g.add(lint);
  }
  /* רצפת פנים: פרקט; רצפת חוץ: ריצוף טרוורטין בדוגמה צרפתית */
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(16,7),new THREE.MeshStandardMaterial({color:0xffffff,map:simGetFloorTex(),roughness:0.75,metalness:0,envMapIntensity:0.12}));
  floor.rotation.x=-Math.PI/2; floor.position.set(0,FLOOR-0.004,3.35); floor.receiveShadow=true; g.add(floor);
  const pav=new THREE.Mesh(new THREE.PlaneGeometry(16,3.1),new THREE.MeshStandardMaterial({color:0xffffff,map:simGetPaversTex(),roughness:0.85,metalness:0,envMapIntensity:0.1}));
  pav.rotation.x=-Math.PI/2; pav.position.set(0,FLOOR-0.006,-1.72); pav.receiveShadow=true; g.add(pav);
  const back=new THREE.Mesh(new THREE.PlaneGeometry(17,8.5),new THREE.MeshBasicMaterial({map:simGetViewTex()}));
  back.position.set(0,0.6,-3.2); g.add(back);
  // ----- משקוף: חתך אמיתי שנסחף עם פינות 45° -----
  win.add(sweepRing(frameContour(ff,D),Wd,Hd,alu));
  // ארגז תריס בצבע הפרופיל, יושב על המשקוף בתוך הפתח
  if(boxH>0){
    box(Wd,boxH,D*1.06,0,Hd/2+boxH/2,0.01,alu);
    box(Wd,0.014,D*1.1,0,Hd/2+0.007,0.012,aluD); /* תפר תחתון */
  }
  const iW=Wd-2*ff, iH=Hd-2*ff;
  const X=f=>-iW/2+f*iW, Y=f=>iH/2-f*iH;
  // כנף עם חתך אמיתי + זכוכית + חלוקות מודבקות על הזכוכית
  const sashD=D*0.62, barw=Math.max(0.02,ss*0.5);
  function sashCell(cx,cy,w,h,z,ci){
    const sr=sweepRing(sashContour(ss,sashD),w,h,alu);
    sr.position.set(cx,cy,z); win.add(sr);
    const gl=new THREE.Mesh(new THREE.PlaneGeometry(Math.max(0.02,w-2*ss+0.02),Math.max(0.02,h-2*ss+0.02)),glassMat);
    gl.position.set(cx,cy,z-0.01); gl.castShadow=false; gl.receiveShadow=false; win.add(gl);
    const zBar=z+sashD/2*0.78+0.012, gw=w-2*ss, gh=h-2*ss;
    sim.vLines.forEach(f=>{ const x=X(f);
      if(x>cx-gw/2+barw && x<cx+gw/2-barw) box(barw,gh,0.016,x,cy,zBar,alu); });
    sim.hLines.forEach(L=>{ const wgi=hlineWing(L);
      if(wgi>=0 && wgi!==ci) return; /* קו של כנף אחרת */
      const y=Y(hlineF(L));
      if(y>cy-gh/2+barw && y<cy+gh/2-barw) box(gw,barw,0.016,cx,y,zBar,alu); });
    /* צורות חופשיות שיושרו — קשת/מלבן/אליפסה על הזכוכית של הכנף */
    const seg3=(x0,y0,x1,y1)=>{ const len=Math.hypot(x1-x0,y1-y0); if(len<0.005) return;
      const m=new THREE.Mesh(new THREE.BoxGeometry(len*1.06,barw,0.016),alu);
      m.position.set((x0+x1)/2,(y0+y1)/2,zBar); m.rotation.z=Math.atan2(y1-y0,x1-x0);

        for(let q=0;q<N;q++){ const a0=q/N*2*Math.PI, a1=(q+1)/N*2*Math.PI;

        const rx=(x1-x0)/2, ry=Math.min(rx,(yT-yB2)*0.6), yS=yT-ry, cx2=(x0+x1)/2, N=8;
        seg3(x0,yB2,x0,yS); seg3(x1,yB2,x1,yS);
        for(let q=0;q<N;q++){ const a0=Math.PI-q/N*Math.PI, a1=Math.PI-(q+1)/N*Math.PI;
          seg3(cx2+rx*Math.cos(a0),yS+ry*Math.sin(a0),cx2+rx*Math.cos(a1),yS+ry*Math.sin(a1)); }
      }
    });
  }
  const off=Math.min(0.06,D*0.22);
  const wings=simWingCount();
  if(wings===0){

    sashCell(0,0,iW,iH,0,0);
  } else if(kind==="slide"){
    // כנפיים חופפות בשני מפלסי עומק + פסי מסילה
